<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scalable Thread Library Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #06101f;
    --panel: rgba(9, 23, 42, 0.88);
    --panel-strong: rgba(12, 31, 56, 0.98);
    --border: rgba(137, 194, 255, 0.12);
    --text: #e7f0fb;
    --muted: #93a8c7;
    --cyan: #79e6ff;
    --lime: #d0ff72;
    --amber: #ffcc70;
    --rose: #ff7d95;
    --violet: #9f8cff;
    --shadow: 0 22px 50px rgba(0, 0, 0, 0.28);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Space Grotesk', sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(121, 230, 255, 0.16), transparent 28%),
      radial-gradient(circle at top right, rgba(159, 140, 255, 0.14), transparent 32%),
      linear-gradient(160deg, #06101f 0%, #0b1930 52%, #102748 100%);
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(121, 230, 255, 0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(121, 230, 255, 0.045) 1px, transparent 1px);
    background-size: 34px 34px;
    opacity: .32;
  }
  .shell {
    position: relative;
    z-index: 1;
    max-width: 1440px;
    margin: 0 auto;
    padding: 24px;
  }
  .hero {
    border: 1px solid var(--border);
    background: linear-gradient(135deg, rgba(12, 31, 56, 0.92), rgba(8, 20, 38, 0.92));
    border-radius: 30px;
    padding: 28px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(16px);
  }
  .hero-top {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .eyebrow {
    margin: 0 0 10px;
    text-transform: uppercase;
    letter-spacing: .28em;
    font-size: .72rem;
    color: var(--cyan);
    font-family: 'Chakra Petch', sans-serif;
  }
  .hero h1 {
    margin: 0;
    font-size: clamp(2.1rem, 4vw, 4.2rem);
    line-height: .95;
    max-width: 720px;
  }
  .hero p {
    margin: 14px 0 0;
    max-width: 760px;
    color: var(--muted);
    font-size: 1rem;
  }
  .hero-metrics {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(3, minmax(120px, 1fr));
    min-width: min(100%, 390px);
  }
  .metric-chip {
    padding: 14px 16px;
    border-radius: 18px;
    border: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.04);
  }
  .metric-chip span {
    display: block;
    font-size: .72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .18em;
    font-family: 'Chakra Petch', sans-serif;
  }
  .metric-chip strong {
    display: block;
    margin-top: 8px;
    font-size: 1.45rem;
  }
  .nav {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 24px;
  }
  .nav button {
    border: 1px solid transparent;
    background: rgba(255, 255, 255, 0.05);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 999px;
    cursor: pointer;
    font: 600 .92rem 'Chakra Petch', sans-serif;
    letter-spacing: .04em;
    transition: .2s ease;
  }
  .nav button.active {
    background: var(--lime);
    color: #08111f;
  }
  .nav button:hover { border-color: rgba(208, 255, 114, 0.32); }
  .page {
    display: none;
    margin-top: 22px;
    animation: rise .35s ease;
  }
  .page.active { display: block; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .section-title {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: end;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .section-title h2 {
    margin: 0;
    font-size: 2rem;
  }
  .section-title p {
    margin: 8px 0 0;
    color: var(--muted);
  }
  .grid-3, .grid-2, .grid-wide {
    display: grid;
    gap: 18px;
  }
  .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .grid-wide { grid-template-columns: minmax(0, 1.25fr) minmax(320px, .75fr); }
  .card {
    border: 1px solid var(--border);
    background: var(--panel);
    border-radius: 26px;
    padding: 22px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
  }
  .stat-card strong {
    display: block;
    font-size: 3rem;
    margin-top: 12px;
    font-family: 'Chakra Petch', sans-serif;
  }
  .label {
    display: block;
    text-transform: uppercase;
    letter-spacing: .18em;
    font-size: .74rem;
    color: var(--muted);
    font-family: 'Chakra Petch', sans-serif;
  }
  .helper {
    margin-top: 8px;
    color: var(--muted);
    font-size: .93rem;
  }
  .progress-block { margin-top: 18px; }
  .progress-head {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    color: var(--muted);
    font-size: .9rem;
  }
  .progress {
    height: 12px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.08);
    overflow: hidden;
  }
  .progress > div {
    height: 100%;
    border-radius: inherit;
    transition: width .35s ease;
  }
  .timeline-list, .activity-list, .queue-list, .suggestions-list, .settings-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .activity-item, .queue-item, .suggestion-item, .thread-row, .quick-item {
    border: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.03);
    border-radius: 18px;
    padding: 16px;
  }
  .activity-item small, .queue-item small, .thread-row small, .quick-item small {
    color: var(--muted);
  }
  .thread-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 14px;
    align-items: center;
  }
  .thread-row.running {
    border-color: rgba(208, 255, 114, 0.38);
    box-shadow: 0 0 0 1px rgba(208, 255, 114, 0.18) inset;
  }
  .thread-core h3, .queue-item h3, .suggestion-item h3 {
    margin: 0;
    font-size: 1.02rem;
  }
  .thread-meta, .queue-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 8px;
    color: var(--muted);
    font-size: .88rem;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    border-radius: 999px;
    font-size: .78rem;
    font-family: 'Chakra Petch', sans-serif;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .badge.RUNNING, .tone-running { background: rgba(208, 255, 114, 0.14); color: var(--lime); }
  .badge.PAUSED, .tone-paused { background: rgba(159, 140, 255, 0.16); color: var(--violet); }
  .badge.PENDING, .tone-pending { background: rgba(121, 230, 255, 0.14); color: var(--cyan); }
  .badge.COMPLETED, .tone-completed { background: rgba(255, 204, 112, 0.16); color: var(--amber); }
  .badge.FAILED, .tone-failed, .badge.TERMINATED { background: rgba(255, 125, 149, 0.16); color: var(--rose); }
  .btn-row, .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  button, select, input {
    font: inherit;
  }
  button.action, .pill-action {
    border: 1px solid transparent;
    border-radius: 16px;
    padding: 12px 16px;
    cursor: pointer;
    transition: .2s ease;
    font-weight: 700;
  }
  button.action.primary { background: var(--lime); color: #09101b; }
  button.action.secondary { background: rgba(255,255,255,.08); color: var(--text); }
  button.action.warn { background: rgba(255, 125, 149, 0.14); color: var(--rose); }
  button.action.cyan { background: rgba(121, 230, 255, 0.14); color: var(--cyan); }
  button.action:hover { transform: translateY(-1px); }
  form.grid-form {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .field.span-2 { grid-column: span 2; }
  input, select {
    border: 1px solid var(--border);
    background: rgba(0, 0, 0, 0.18);
    border-radius: 16px;
    color: var(--text);
    padding: 14px 15px;
  }
  .scheduler-hero {
    display: grid;
    gap: 18px;
    grid-template-columns: 1.1fr .9fr;
  }
  .scheduler-stage {
    position: relative;
    min-height: 260px;
    border-radius: 26px;
    background:
      linear-gradient(135deg, rgba(121,230,255,.08), rgba(159,140,255,.12)),
      rgba(255,255,255,.03);
    border: 1px solid var(--border);
    padding: 22px;
    overflow: hidden;
  }
  .scheduler-stage::after {
    content: '';
    position: absolute;
    inset: auto 0 0 0;
    height: 90px;
    background: linear-gradient(180deg, transparent, rgba(0,0,0,.18));
  }
  .runner-glow {
    position: absolute;
    right: 18px;
    top: 18px;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(208,255,114,.22), transparent 70%);
    filter: blur(8px);
  }
  .stage-label {
    position: relative;
    z-index: 1;
  }
  .stage-label h3 {
    margin: 0;
    font-size: 1.5rem;
  }
  .stage-label p {
    margin: 10px 0 0;
    color: var(--muted);
    max-width: 520px;
  }
  .schedule-track {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 12px;
    margin-top: 28px;
    overflow-x: auto;
    padding-bottom: 8px;
  }
  .schedule-pill {
    min-width: 180px;
    padding: 14px;
    border-radius: 18px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.05);
  }
  .schedule-pill.active {
    background: rgba(208,255,114,.12);
    border-color: rgba(208,255,114,.35);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.02); opacity: .92; }
  }
  .chart-bars {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 14px;
  }
  .chart-row {
    display: grid;
    grid-template-columns: 110px 1fr 50px;
    gap: 12px;
    align-items: center;
  }
  .bar-shell {
    height: 14px;
    border-radius: 999px;
    background: rgba(255,255,255,.08);
    overflow: hidden;
  }
  .bar-shell span {
    display: block;
    height: 100%;
    border-radius: inherit;
  }
  .insight-grid {
    display: grid;
    gap: 18px;
    grid-template-columns: 1.15fr .85fr;
  }
  .switcher {
    display: inline-flex;
    gap: 8px;
    padding: 8px;
    background: rgba(255,255,255,.05);
    border-radius: 18px;
    border: 1px solid var(--border);
  }
  .switcher button {
    border: none;
    border-radius: 12px;
    padding: 10px 14px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-weight: 700;
  }
  .switcher button.active {
    background: var(--lime);
    color: #09111d;
  }
  #toast {
    position: fixed;
    right: 24px;
    bottom: 24px;
    background: var(--panel-strong);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    min-width: 220px;
    box-shadow: var(--shadow);
    transform: translateY(110px);
    opacity: 0;
    transition: .25s ease;
    z-index: 999;
  }
  #toast.show {
    transform: translateY(0);
    opacity: 1;
  }
  .empty {
    border: 1px dashed var(--border);
    border-radius: 18px;
    padding: 20px;
    color: var(--muted);
    text-align: center;
  }
  @media (max-width: 1100px) {
    .grid-3, .grid-2, .grid-wide, .scheduler-hero, .insight-grid, form.grid-form { grid-template-columns: 1fr; }
  }
  @media (max-width: 720px) {
    .shell { padding: 16px; }
    .hero { padding: 20px; }
    .hero-metrics { grid-template-columns: 1fr; }
    .thread-row { grid-template-columns: 1fr; }
    .chart-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="hero-top">
        <div>
          <p class="eyebrow">OS Thread Console</p>
          <h1>Scalable Thread Library Management System</h1>
          <p>Multi-view management console for live threads, scheduler flow, analytics, AI suggestions, and runtime configuration. This UI now updates directly inside your current project surface.</p>
        </div>
        <div class="hero-metrics">
          <div class="metric-chip"><span>Clock</span><strong id="clock">--:--:--</strong></div>
          <div class="metric-chip"><span>API</span><strong>localhost:5000</strong></div>
          <div class="metric-chip"><span>Mode</span><strong id="hero-mode">FIFO</strong></div>
        </div>
      </div>
      <div class="nav" id="nav"></div>
    </section>

    <section id="page-dashboard" class="page"></section>
    <section id="page-threads" class="page"></section>
    <section id="page-scheduler" class="page"></section>
    <section id="page-analytics" class="page"></section>
    <section id="page-ai" class="page"></section>
    <section id="page-settings" class="page"></section>
  </div>

  <div id="toast"></div>

<script>
const API = "http://localhost:5000/api";
const PAGES = [
  ["dashboard", "Dashboard"],
  ["threads", "Thread Management"],
  ["scheduler", "Scheduler"],
  ["analytics", "Analytics"],
  ["ai", "AI Suggestions"],
  ["settings", "Settings"],
];

const state = {
  page: location.hash.replace("#", "") || "dashboard",
  threads: [],
  summary: { states: {}, event_log: [], pool: {} },
  poolTasks: [],
  config: { scheduling_type: "FIFO", simulation_speed: "Normal" },
  suggestions: { generated_at: "--:--:--", suggestions: [] },
};

function toast(message, error = false) {
  const el = document.getElementById("toast");
  el.textContent = message;
  el.style.borderColor = error ? "rgba(255, 125, 149, 0.35)" : "rgba(121, 230, 255, 0.25)";
  el.classList.add("show");
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove("show"), 2600);
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function apiCall(path, options = {}) {
  return fetch(`${API}${path}`, options).then(async (response) => {
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || "Request failed");
    return data;
  });
}

function getOrderedThreads() {
  const threads = [...state.threads];
  if (state.config.scheduling_type === "PRIORITY") {
    return threads.sort((a, b) => (b.priority || 0) - (a.priority || 0) || (a.created_time || 0) - (b.created_time || 0));
  }
  return threads.sort((a, b) => (a.created_time || 0) - (b.created_time || 0));
}

function getCounts() {
  const threads = state.threads;
  const states = state.summary.states || {};
  const total = threads.length;
  const active = (states.RUNNING || 0) + (states.PAUSED || 0);
  const completed = (states.COMPLETED || 0) + (states.TERMINATED || 0);
  const waiting = states.PENDING || 0;
  const failed = states.FAILED || 0;
  return { total, active, completed, waiting, failed };
}

function averageDuration() {
  const completed = state.threads.filter((thread) => Number.isFinite(thread.duration));
  if (!completed.length) return 0;
  const total = completed.reduce((sum, thread) => sum + thread.duration, 0);
  return +(total / completed.length).toFixed(2);
}

function progressPercent(part, total) {
  if (!total) return 0;
  return Math.round((part / total) * 100);
}

function renderNav() {
  const nav = document.getElementById("nav");
  nav.innerHTML = PAGES.map(([id, label]) => `
    <button class="${state.page === id ? "active" : ""}" onclick="navigate('${id}')">${label}</button>
  `).join("");
}

function navigate(page) {
  state.page = page;
  location.hash = page;
  render();
}

function renderDashboard() {
  const { total, active, completed, waiting, failed } = getCounts();
  const completion = progressPercent(completed, total);
  const utilization = progressPercent(active, total);
  const waitingShare = progressPercent(waiting, total);
  const runtime = averageDuration();
  const activity = state.summary.event_log || [];

  document.getElementById("page-dashboard").innerHTML = `
    <div class="section-title">
      <div>
        <h2>Dashboard</h2>
        <p>High-level visibility into total workload, live execution, completion, and recent events.</p>
      </div>
    </div>
    <div class="grid-3">
      <div class="card stat-card"><span class="label">Total Threads</span><strong>${total}</strong><div class="helper">All created workloads.</div></div>
      <div class="card stat-card"><span class="label">Active Threads</span><strong style="color:var(--lime)">${active}</strong><div class="helper">Running or paused threads.</div></div>
      <div class="card stat-card"><span class="label">Completed</span><strong style="color:var(--amber)">${completed}</strong><div class="helper">Finished or terminated work.</div></div>
    </div>
    <div class="grid-wide" style="margin-top:18px;">
      <div class="card">
        <span class="label">Visual Progress</span>
        <div class="progress-block">
          <div class="progress-head"><span>Completion Rate</span><span>${completion}%</span></div>
          <div class="progress"><div style="width:${completion}%;background:linear-gradient(90deg,var(--lime),#91ffbb)"></div></div>
        </div>
        <div class="progress-block">
          <div class="progress-head"><span>Waiting Queue Pressure</span><span>${waitingShare}%</span></div>
          <div class="progress"><div style="width:${waitingShare}%;background:linear-gradient(90deg,var(--cyan),var(--violet))"></div></div>
        </div>
        <div class="progress-block">
          <div class="progress-head"><span>Runtime Utilization</span><span>${utilization}%</span></div>
          <div class="progress"><div style="width:${utilization}%;background:linear-gradient(90deg,var(--amber),#ff9a6b)"></div></div>
        </div>
        <div class="grid-3" style="margin-top:18px;">
          <div class="quick-item"><span class="label">Avg Execution</span><strong>${runtime}s</strong></div>
          <div class="quick-item"><span class="label">Waiting</span><strong>${waiting}</strong></div>
          <div class="quick-item"><span class="label">Failed</span><strong>${failed}</strong></div>
        </div>
      </div>
      <div class="card">
        <span class="label">Recent Activity</span>
        <div class="activity-list" style="margin-top:14px;">
          ${activity.length ? activity.slice().reverse().map((entry) => `
            <div class="activity-item">
              <strong>${escapeHtml(entry.message)}</strong>
              <div class="helper">${entry.level} • ${entry.time}</div>
            </div>
          `).join("") : '<div class="empty">No activity from the backend yet.</div>'}
        </div>
      </div>
    </div>
  `;
}

function renderThreadsPage() {
  const ordered = getOrderedThreads();
  const rows = ordered.map((thread, index) => `
    <div class="thread-row ${thread.state === 'RUNNING' ? 'running' : ''}">
      <span class="badge ${thread.state}">${thread.state}</span>
      <div class="thread-core">
        <h3>${escapeHtml(thread.name)}</h3>
        <div class="thread-meta">
          <span>${escapeHtml(thread.thread_id)}</span>
          <span>Priority ${thread.priority}</span>
          <span>${state.config.scheduling_type === "FIFO" ? `Queue #${index + 1}` : "Priority ordered"}</span>
          <span>${thread.duration ? `${thread.duration.toFixed(2)}s` : "In progress"}</span>
        </div>
      </div>
      <div class="btn-row">
        ${thread.state === "RUNNING" ? `<button class="action secondary" onclick="pauseThread('${thread.thread_id}')">Pause</button>` : ""}
        ${thread.state === "PAUSED" ? `<button class="action cyan" onclick="resumeThread('${thread.thread_id}')">Resume</button>` : ""}
        ${["RUNNING", "PAUSED", "PENDING"].includes(thread.state) ? `<button class="action warn" onclick="terminateThread('${thread.thread_id}')">Terminate</button>` : ""}
      </div>
    </div>
  `).join("");

  document.getElementById("page-threads").innerHTML = `
    <div class="section-title">
      <div>
        <h2>Thread Management</h2>
        <p>Create new tasks, assign priority, and inspect queue order under ${state.config.scheduling_type} scheduling.</p>
      </div>
    </div>
    <div class="grid-wide">
      <div class="card">
        <span class="label">Create New Thread</span>
        <form class="grid-form" onsubmit="createThread(event)">
          <div class="field span-2">
            <label class="label">Thread Name</label>
            <input id="thread-name" value="Worker-${String(Date.now()).slice(-4)}" />
          </div>
          <div class="field">
            <label class="label">Thread Type</label>
            <select id="thread-kind">
              <option value="cpu">CPU-Bound</option>
              <option value="io">I/O-Bound</option>
            </select>
          </div>
          <div class="field">
            <label class="label">Priority</label>
            <select id="thread-priority">
              <option value="3">Low</option>
              <option value="6" selected>Medium</option>
              <option value="9">High</option>
            </select>
          </div>
          <div class="field">
            <label class="label">Duration / Steps</label>
            <input id="thread-duration" type="number" min="1" max="20" value="5" />
          </div>
          <div class="field">
            <label class="label">Queue Logic</label>
            <input value="${state.config.scheduling_type === "FIFO" ? "FIFO queue order" : "Priority with queue tie-break"}" disabled />
          </div>
          <div class="field span-2">
            <button class="action primary" type="submit">Create Thread</button>
          </div>
        </form>
      </div>
      <div class="card">
        <span class="label">Queue Order</span>
        <div class="queue-list" style="margin-top:14px;">
          ${rows || '<div class="empty">No threads available. Create one to populate the queue.</div>'}
        </div>
      </div>
    </div>
  `;
}

function renderSchedulerPage() {
  const ordered = getOrderedThreads();
  const running = ordered.find((thread) => thread.state === "RUNNING");
  const waiting = ordered.filter((thread) => thread.state === "PENDING" || thread.state === "PAUSED");
  const completed = ordered.filter((thread) => ["COMPLETED", "FAILED", "TERMINATED"].includes(thread.state));

  document.getElementById("page-scheduler").innerHTML = `
    <div class="section-title">
      <div>
        <h2>Scheduler Simulation</h2>
        <p>Visual execution lane for running, waiting, and completed threads with direct controls.</p>
      </div>
      <div class="toolbar">
        <button class="action primary" onclick="schedulerStart()">Start</button>
        <button class="action secondary" onclick="schedulerPause()">Pause</button>
        <button class="action warn" onclick="schedulerReset()">Reset</button>
      </div>
    </div>
    <div class="scheduler-hero">
      <div class="scheduler-stage">
        <div class="runner-glow"></div>
        <div class="stage-label">
          <span class="label">Currently Running</span>
          <h3>${running ? escapeHtml(running.name) : "Idle Scheduler"}</h3>
          <p>${running ? `Thread ${escapeHtml(running.thread_id)} is active with priority ${running.priority}.` : "No thread is currently running. Use Start to resume paused work or create a new thread."}</p>
        </div>
        <div class="schedule-track">
          ${ordered.length ? ordered.map((thread, index) => `
            <div class="schedule-pill ${running && running.thread_id === thread.thread_id ? "active" : ""}">
              <small>${state.config.scheduling_type === "FIFO" ? `Slot ${index + 1}` : `P${thread.priority}`}</small>
              <h4 style="margin:8px 0 0;">${escapeHtml(thread.name)}</h4>
              <div class="helper">${thread.state}</div>
            </div>
          `).join("") : '<div class="empty" style="min-width:240px;">No threads to simulate yet.</div>'}
        </div>
      </div>
      <div class="card">
        <span class="label">State Summary</span>
        <div class="queue-list" style="margin-top:14px;">
          <div class="queue-item"><h3>Running</h3><div class="queue-meta"><span>${running ? 1 : 0}</span><span>Active execution lane</span></div></div>
          <div class="queue-item"><h3>Waiting</h3><div class="queue-meta"><span>${waiting.length}</span><span>Pending or paused</span></div></div>
          <div class="queue-item"><h3>Completed</h3><div class="queue-meta"><span>${completed.length}</span><span>Finished, failed, or terminated</span></div></div>
        </div>
      </div>
    </div>
    <div class="grid-2" style="margin-top:18px;">
      <div class="card">
        <span class="label">Waiting Queue</span>
        <div class="queue-list" style="margin-top:14px;">
          ${waiting.length ? waiting.map((thread, index) => `
            <div class="queue-item">
              <h3>${escapeHtml(thread.name)}</h3>
              <div class="queue-meta">
                <span>${escapeHtml(thread.thread_id)}</span>
                <span>${state.config.scheduling_type === "FIFO" ? `Queue #${index + 1}` : `Priority ${thread.priority}`}</span>
                <span>${thread.state}</span>
              </div>
            </div>
          `).join("") : '<div class="empty">No waiting threads.</div>'}
        </div>
      </div>
      <div class="card">
        <span class="label">Completed Queue</span>
        <div class="queue-list" style="margin-top:14px;">
          ${completed.length ? completed.slice(0, 8).map((thread) => `
            <div class="queue-item">
              <h3>${escapeHtml(thread.name)}</h3>
              <div class="queue-meta">
                <span>${escapeHtml(thread.thread_id)}</span>
                <span>${thread.state}</span>
                <span>${thread.duration ? `${thread.duration.toFixed(2)}s` : "No duration"}</span>
              </div>
            </div>
          `).join("") : '<div class="empty">No completed threads yet.</div>'}
        </div>
      </div>
    </div>
  `;
}

function buildBars(items, colorMap) {
  const max = Math.max(...items.map((item) => item.value), 1);
  return `
    <div class="chart-bars">
      ${items.map((item) => `
        <div class="chart-row">
          <strong>${item.label}</strong>
          <div class="bar-shell"><span style="width:${(item.value / max) * 100}%;background:${colorMap[item.label] || "var(--cyan)"}"></span></div>
          <strong>${item.value}</strong>
        </div>
      `).join("")}
    </div>
  `;
}

function renderAnalyticsPage() {
  const states = state.summary.states || {};
  const stateItems = [
    { label: "RUNNING", value: states.RUNNING || 0 },
    { label: "PAUSED", value: states.PAUSED || 0 },
    { label: "PENDING", value: states.PENDING || 0 },
    { label: "COMPLETED", value: states.COMPLETED || 0 },
    { label: "FAILED", value: states.FAILED || 0 },
  ];
  const priorityItems = [
    { label: "High", value: state.threads.filter((thread) => (thread.priority || 0) >= 8).length },
    { label: "Medium", value: state.threads.filter((thread) => (thread.priority || 0) >= 4 && (thread.priority || 0) < 8).length },
    { label: "Low", value: state.threads.filter((thread) => (thread.priority || 0) < 4).length },
  ];
  const throughput = getCounts().completed;
  const avg = averageDuration();
  const waitPressure = getCounts().waiting;

  document.getElementById("page-analytics").innerHTML = `
    <div class="section-title">
      <div>
        <h2>Analytics</h2>
        <p>Execution time, throughput, average duration, and queue pressure visualized from current thread state.</p>
      </div>
    </div>
    <div class="grid-3">
      <div class="card stat-card"><span class="label">Execution Time</span><strong>${avg}s</strong><div class="helper">Average completed duration.</div></div>
      <div class="card stat-card"><span class="label">Throughput</span><strong style="color:var(--lime)">${throughput}</strong><div class="helper">Completed workloads.</div></div>
      <div class="card stat-card"><span class="label">Average Wait Pressure</span><strong style="color:var(--amber)">${waitPressure}</strong><div class="helper">Pending queue depth.</div></div>
    </div>
    <div class="grid-2" style="margin-top:18px;">
      <div class="card">
        <span class="label">Thread States</span>
        ${buildBars(stateItems, {
          RUNNING: "linear-gradient(90deg,var(--lime),#9cff9c)",
          PAUSED: "linear-gradient(90deg,var(--violet),#c2b5ff)",
          PENDING: "linear-gradient(90deg,var(--cyan),#79c2ff)",
          COMPLETED: "linear-gradient(90deg,var(--amber),#ffd99c)",
          FAILED: "linear-gradient(90deg,var(--rose),#ff9caf)",
        })}
      </div>
      <div class="card">
        <span class="label">Priority Distribution</span>
        ${buildBars(priorityItems, {
          High: "linear-gradient(90deg,var(--rose),#ffa7b7)",
          Medium: "linear-gradient(90deg,var(--amber),#ffe09c)",
          Low: "linear-gradient(90deg,var(--cyan),#9fe9ff)",
        })}
      </div>
    </div>
  `;
}

function renderAIPage() {
  const suggestions = state.suggestions.suggestions || [];
  document.getElementById("page-ai").innerHTML = `
    <div class="section-title">
      <div>
        <h2>AI Suggestions</h2>
        <p>Mock assistant recommendations for scheduling mode, bottleneck detection, and queue tuning.</p>
      </div>
      <small style="color:var(--muted)">Generated at ${state.suggestions.generated_at || "--:--:--"}</small>
    </div>
    <div class="insight-grid">
      <div class="card">
        <span class="label">Assistant Output</span>
        <div class="suggestions-list" style="margin-top:14px;">
          ${suggestions.length ? suggestions.map((item) => `
            <div class="suggestion-item">
              <h3>${escapeHtml(item.title)}</h3>
              <p class="helper">${escapeHtml(item.insight)}</p>
              <div class="queue-meta"><span>Recommendation</span><span>${escapeHtml(item.recommendation)}</span></div>
            </div>
          `).join("") : '<div class="empty">AI insights are not available yet.</div>'}
        </div>
      </div>
      <div class="card">
        <span class="label">Quick Actions</span>
        <div class="settings-list" style="margin-top:14px;">
          <div class="quick-item"><strong>Current scheduling</strong><div class="helper">${state.config.scheduling_type}</div></div>
          <button class="action secondary" onclick="setScheduling('FIFO')">Use FIFO</button>
          <button class="action cyan" onclick="setScheduling('PRIORITY')">Use Priority</button>
          <button class="action primary" onclick="schedulerStart()">Resume Execution</button>
        </div>
      </div>
    </div>
  `;
}

function renderSettingsPage() {
  document.getElementById("page-settings").innerHTML = `
    <div class="section-title">
      <div>
        <h2>Settings</h2>
        <p>Change scheduling type, adjust simulation speed, and reset the system from the current UI.</p>
      </div>
    </div>
    <div class="grid-wide">
      <div class="card">
        <span class="label">Configuration</span>
        <div style="margin-top:14px;">
          <div class="field">
            <label class="label">Scheduling Type</label>
            <div class="switcher">
              <button class="${state.config.scheduling_type === "FIFO" ? "active" : ""}" onclick="setScheduling('FIFO')">FIFO</button>
              <button class="${state.config.scheduling_type === "PRIORITY" ? "active" : ""}" onclick="setScheduling('PRIORITY')">Priority</button>
            </div>
          </div>
          <div class="field" style="margin-top:16px;">
            <label class="label">Simulation Speed</label>
            <select id="speed-select" onchange="setSimulationSpeed(this.value)">
              <option value="Slow" ${state.config.simulation_speed === "Slow" ? "selected" : ""}>Slow</option>
              <option value="Normal" ${state.config.simulation_speed === "Normal" ? "selected" : ""}>Normal</option>
              <option value="Fast" ${state.config.simulation_speed === "Fast" ? "selected" : ""}>Fast</option>
            </select>
          </div>
        </div>
      </div>
      <div class="card">
        <span class="label">System Controls</span>
        <div class="settings-list" style="margin-top:14px;">
          <button class="action secondary" onclick="schedulerPause()">Pause Running Threads</button>
          <button class="action cyan" onclick="cleanupFinished()">Cleanup Finished Threads</button>
          <button class="action warn" onclick="resetSystem()">Reset System</button>
        </div>
      </div>
    </div>
  `;
}

function render() {
  document.getElementById("hero-mode").textContent = state.config.scheduling_type;
  renderNav();
  renderDashboard();
  renderThreadsPage();
  renderSchedulerPage();
  renderAnalyticsPage();
  renderAIPage();
  renderSettingsPage();
  document.querySelectorAll(".page").forEach((page) => page.classList.remove("active"));
  document.getElementById(`page-${state.page}`)?.classList.add("active");
}

async function refresh() {
  try {
    const [threads, summary, poolTasks, config, suggestions] = await Promise.all([
      apiCall("/threads"),
      apiCall("/summary"),
      apiCall("/pool/tasks"),
      apiCall("/config").catch(() => state.config),
      apiCall("/ai/suggestions").catch(() => ({ generated_at: "--:--:--", suggestions: [] })),
    ]);
    state.threads = threads;
    state.summary = summary;
    state.poolTasks = poolTasks;
    state.config = config;
    state.suggestions = suggestions;
    render();
  } catch (error) {
    toast(error.message, true);
  }
}

async function createThread(event) {
  event.preventDefault();
  const kind = document.getElementById("thread-kind").value;
  const duration = Number(document.getElementById("thread-duration").value);
  try {
    const payload = {
      name: document.getElementById("thread-name").value || "Worker",
      kind,
      priority: Number(document.getElementById("thread-priority").value),
      duration,
      steps: duration,
    };
    const data = await apiCall("/threads/create", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    toast(data.message);
    refresh();
  } catch (error) {
    toast(error.message, true);
  }
}

async function pauseThread(threadId) {
  try {
    const data = await apiCall(`/threads/${threadId}/pause`, { method: "POST" });
    toast(data.message);
    refresh();
  } catch (error) {
    toast(error.message, true);
  }
}

async function resumeThread(threadId) {
  try {
    const data = await apiCall(`/threads/${threadId}/resume`, { method: "POST" });
    toast(data.message);
    refresh();
  } catch (error) {
    toast(error.message, true);
  }
}

async function terminateThread(threadId) {
  try {
    const data = await apiCall(`/threads/${threadId}/terminate`, { method: "POST" });
    toast(data.message);
    refresh();
  } catch (error) {
    toast(error.message, true);
  }
}

async function schedulerStart() {
  try {
    const data = await apiCall("/threads/bulk", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "resume" }),
    });
    toast(data.message || "Scheduler started.");
    refresh();
  } catch (error) {
    toast(error.message, true);
  }
}

async function schedulerPause() {
  try {
    const data = await apiCall("/threads/bulk", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "pause" }),
    });
    toast(data.message || "Scheduler paused.");
    refresh();
  } catch (error) {
    toast(error.message, true);
  }
}

async function schedulerReset() {
  try {
    const data = await apiCall("/threads/bulk", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "cleanup" }),
    });
    toast(data.message || "Simulation reset.");
    refresh();
  } catch (error) {
    toast(error.message, true);
  }
}

async function cleanupFinished() {
  return schedulerReset();
}

async function setScheduling(mode) {
  try {
    const data = await apiCall("/config", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        scheduling_type: mode,
        simulation_speed: state.config.simulation_speed,
      }),
    });
    toast(data.message || "Scheduling updated.");
    refresh();
  } catch (error) {
    toast(error.message, true);
  }
}

async function setSimulationSpeed(speed) {
  try {
    const data = await apiCall("/config", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        scheduling_type: state.config.scheduling_type,
        simulation_speed: speed,
      }),
    });
    toast(data.message || "Simulation speed updated.");
    refresh();
  } catch (error) {
    toast(error.message, true);
  }
}

async function resetSystem() {
  try {
    const data = await apiCall("/system/reset", { method: "POST" });
    toast(data.message || "System reset.");
    refresh();
  } catch (error) {
    toast(error.message, true);
  }
}

window.addEventListener("hashchange", () => {
  state.page = location.hash.replace("#", "") || "dashboard";
  render();
});

setInterval(() => {
  document.getElementById("clock").textContent = new Date().toLocaleTimeString();
}, 1000);

document.getElementById("clock").textContent = new Date().toLocaleTimeString();
renderNav();
render();
refresh();
setInterval(refresh, 1800);
</script>
</body>
</html>
